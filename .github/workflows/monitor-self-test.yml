# =============================================================================
# Self-test workflow for github-monitors
# =============================================================================
# Validates success and failure paths for summaries, artifacts, and Slack.
# Add repository secret SLACK_WEBHOOK_URL before enabling scheduled runs.
# =============================================================================

name: Monitor Self Test

on:
  workflow_dispatch:
    inputs:
      simulate-failure:
        description: Force a failing cron step to test Slack + error parsing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  cron:
    name: Simulated cron job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run simulated cron job
        id: cron
        run: |
          set -o pipefail
          LOG="${RUNNER_TEMP}/cron-output.log"
          if [ "${{ inputs.simulate-failure }}" = "true" ]; then
            python3 -c "raise ValueError('Simulated cron failure: missing BIGQUERY_TABLE env var')" 2>&1 | tee "${LOG}"
          else
            python3 -c "print('Cron completed successfully'); print('records_processed=42')" 2>&1 | tee "${LOG}"
            echo "records-processed=42" >> "$GITHUB_OUTPUT"
          fi

      - name: Workflow monitor
        if: always()
        uses: ./.github/actions/workflow-monitor
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow-status: ${{ steps.cron.outcome }}
          failed-step: Run simulated cron job
          log-file: ${{ runner.temp }}/cron-output.log
          records-processed: ${{ steps.cron.outputs.records-processed }}
