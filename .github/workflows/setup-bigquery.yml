# =============================================================================
# One-time (or on-demand) BigQuery provisioning for Looker Studio
# =============================================================================
# Creates dataset github_cron_monitoring and table workflow_run_events.
# Requires org secret LIVESTORE_SA_BASE64 (base64-encoded service account JSON).
# =============================================================================

name: Setup BigQuery Monitoring

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account credentials
        shell: bash
        run: |
          set -euo pipefail
          export CREDS_FILE="${RUNNER_TEMP}/gcp-sa.json"
          export GCP_CREDENTIALS_BASE64="${{ secrets.LIVESTORE_SA_BASE64 }}"
          python3 .github/actions/workflow-monitor/scripts/decode_gcp_credentials.py
          echo "GOOGLE_APPLICATION_CREDENTIALS=${CREDS_FILE}" >> "$GITHUB_ENV"

      - name: Create dataset and table
        run: |
          python .github/actions/workflow-monitor/scripts/setup_bigquery.py \
            --config .github/actions/workflow-monitor/config/bigquery.json \
            --credentials "${GOOGLE_APPLICATION_CREDENTIALS}"
