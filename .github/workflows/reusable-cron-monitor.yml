# =============================================================================
# Reusable Workflow: Cron Monitor (BigQuery + summary)
# =============================================================================

name: Reusable Cron Monitor

on:
  workflow_call:
    inputs:
      workflow-status:
        description: Result of the monitored job (success, failure, cancelled)
        required: true
        type: string
      failed-step:
        description: Name of the step that failed
        required: false
        type: string
        default: ""
      log-file:
        description: Absolute path to captured step log on the runner
        required: false
        type: string
        default: ""
      records-processed:
        description: Optional processed record count for the summary table
        required: false
        type: string
        default: ""
      warnings:
        description: Optional warnings to show in the summary
        required: false
        type: string
        default: ""
      scheduled-cron:
        description: Cron expression when not auto-detected from schedule event
        required: false
        type: string
        default: ""
      artifact-retention-days:
        description: Artifact retention for workflow-summary
        required: false
        type: string
        default: "30"
    secrets:
      LIVESTORE_SA_JSON:
        description: GCP service account JSON for BigQuery writes
        required: true

jobs:
  monitor:
    name: Workflow summary and BigQuery log
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run workflow monitor
        uses: ./.github/actions/workflow-monitor
        with:
          gcp-credentials-json: ${{ secrets.LIVESTORE_SA_JSON }}
          workflow-status: ${{ inputs.workflow-status }}
          failed-step: ${{ inputs.failed-step }}
          log-file: ${{ inputs.log-file }}
          records-processed: ${{ inputs.records-processed }}
          warnings: ${{ inputs.warnings }}
          scheduled-cron: ${{ inputs.scheduled-cron }}
          artifact-retention-days: ${{ inputs.artifact-retention-days }}
