name: Workflow Monitor
description: >
  Inserts one row into the CENTRAL BigQuery table
  combine-data-pipeline-482809.github_cron_monitoring.workflow_run_events
  (shared by all repos — no per-repo tables). Also writes job summary + artifact.
branding:
  icon: graph
  color: blue

inputs:
  gcp-credentials-base64:
    description: Base64-encoded GCP service account JSON (org secret LIVESTORE_SA_BASE64). Decoded at runtime.
    required: true
  workflow-status:
    description: Outcome of the monitored step or job (success, failure, cancelled)
    required: true
  failed-step:
    description: Human-readable name of the step that failed
    required: false
    default: ""
  log-file:
    description: Path to captured stdout/stderr from the failed step
    required: false
    default: ""
  records-processed:
    description: Optional count of records processed by the cron job
    required: false
    default: ""
  warnings:
    description: Optional warning text to include in the summary
    required: false
    default: ""
  job-started-at:
    description: ISO-8601 job start timestamp
    required: false
    default: ""
  scheduled-cron:
    description: Cron expression for scheduled workflows (auto-detected when empty)
    required: false
    default: ""
  schedule-status:
    description: >
      Set to manual-only when cron schedule lines are commented/disabled in YAML.
      Leave empty for auto-detection from trigger type.
    required: false
    default: ""
  artifact-retention-days:
    description: Artifact retention in days
    required: false
    default: "30"
  # slack-webhook-url:
  #   description: Slack Incoming Webhook URL (disabled — enable when notifications return)
  #   required: false
  #   default: ""

outputs:
  summary-path:
    description: Path to the generated media/workflow-summary.md file
    value: ${{ steps.write-summary.outputs.summary-path }}
  error-message:
    description: Extracted error message when the workflow failed
    value: ${{ steps.parse-error.outputs.error-message }}
  action-required:
    description: Recommended remediation for the failure
    value: ${{ steps.parse-error.outputs.action-required }}
  bigquery-event-id:
    description: UUID of the row inserted into BigQuery
    value: ${{ steps.bigquery-insert.outputs.event-id }}

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # 1. Prepare workspace paths and timestamps
    # -------------------------------------------------------------------------
    - name: Prepare monitor context
      id: context
      shell: bash
      env:
        INPUT_JOB_STARTED: ${{ inputs.job-started-at }}
      run: |
        set -euo pipefail
        mkdir -p media "${RUNNER_TEMP}/workflow-monitor"
        END_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        if [ -n "${INPUT_JOB_STARTED}" ]; then
          START_TIME="${INPUT_JOB_STARTED}"
        else
          START_TIME="${END_TIME}"
        fi
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        ARTIFACT_URL="${RUN_URL}#artifacts"
        echo "end-time=${END_TIME}" >> "$GITHUB_OUTPUT"
        echo "start-time=${START_TIME}" >> "$GITHUB_OUTPUT"
        echo "run-url=${RUN_URL}" >> "$GITHUB_OUTPUT"
        echo "artifact-url=${ARTIFACT_URL}" >> "$GITHUB_OUTPUT"
        echo "summary-path=${GITHUB_WORKSPACE}/media/workflow-summary.md" >> "$GITHUB_OUTPUT"

    # -------------------------------------------------------------------------
    # 2. Extract actionable error details from logs (failures only)
    # -------------------------------------------------------------------------
    - name: Parse failure details
      id: parse-error
      if: ${{ inputs.workflow-status == 'failure' }}
      shell: bash
      env:
        INPUT_FAILED_STEP: ${{ inputs.failed-step }}
        INPUT_LOG_FILE: ${{ inputs.log-file }}
        ERROR_JSON: ${{ runner.temp }}/workflow-monitor/error.json
      run: |
        set -euo pipefail
        ARGS=(python3 "${{ github.action_path }}/scripts/extract_error.py" --output-file "${ERROR_JSON}")
        if [ -n "${INPUT_FAILED_STEP}" ]; then
          ARGS+=(--failed-step "${INPUT_FAILED_STEP}")
        fi
        if [ -n "${INPUT_LOG_FILE}" ] && [ -f "${INPUT_LOG_FILE}" ]; then
          ARGS+=(--log-file "${INPUT_LOG_FILE}")
        fi
        "${ARGS[@]}"
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json, os
        data = json.load(open(os.environ["ERROR_JSON"]))
        print(f"error-message<<EOF\n{data['error_message']}\nEOF")
        print(f"error-type={data['error_type']}")
        print(f"failed-step={data['failed_step']}")
        print(f"action-required<<EOF\n{data['action_required']}\nEOF")
        PY

    - name: Set success defaults
      id: parse-success
      if: ${{ inputs.workflow-status != 'failure' }}
      shell: bash
      run: |
        {
          echo "error-message=None"
          echo "error-type="
          echo "failed-step="
          echo "action-required=No action required."
        } >> "$GITHUB_OUTPUT"

    # -------------------------------------------------------------------------
    # 3. Build Markdown summary (GITHUB_STEP_SUMMARY + media/workflow-summary.md)
    # -------------------------------------------------------------------------
    - name: Write workflow summary
      id: write-summary
      shell: bash
      env:
        INPUT_STATUS: ${{ inputs.workflow-status }}
        INPUT_RECORDS: ${{ inputs.records-processed }}
        INPUT_WARNINGS: ${{ inputs.warnings }}
        ERROR_MESSAGE: ${{ steps.parse-error.outputs.error-message || steps.parse-success.outputs.error-message }}
        FAILED_STEP: ${{ steps.parse-error.outputs.failed-step || steps.parse-success.outputs.failed-step }}
        ACTION_REQUIRED: ${{ steps.parse-error.outputs.action-required || steps.parse-success.outputs.action-required }}
        START_TIME: ${{ steps.context.outputs.start-time }}
        END_TIME: ${{ steps.context.outputs.end-time }}
        RUN_URL: ${{ steps.context.outputs.run-url }}
        ARTIFACT_URL: ${{ steps.context.outputs.artifact-url }}
      run: |
        set -euo pipefail
        export INPUT_STATUS INPUT_RECORDS INPUT_WARNINGS ERROR_MESSAGE FAILED_STEP ACTION_REQUIRED
        export START_TIME END_TIME RUN_URL ARTIFACT_URL
        python3 "${{ github.action_path }}/scripts/build_summary_input.py" \
          > "${RUNNER_TEMP}/workflow-monitor/summary-input.json"
        SUMMARY_PATH="${{ steps.context.outputs.summary-path }}"
        python3 "${{ github.action_path }}/scripts/generate_summary.py" \
          --input-json "${RUNNER_TEMP}/workflow-monitor/summary-input.json" \
          --output-file "${SUMMARY_PATH}" \
          --step-summary-file "${GITHUB_STEP_SUMMARY}"
        echo "summary-path=${SUMMARY_PATH}" >> "$GITHUB_OUTPUT"

    # -------------------------------------------------------------------------
    # 4. Upload media/ as a 30-day artifact named workflow-summary
    # -------------------------------------------------------------------------
    - name: Upload workflow summary artifact
      uses: actions/upload-artifact@v4
      with:
        name: workflow-summary
        path: media/
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: error

    # -------------------------------------------------------------------------
    # 5. Record workflow run in BigQuery (Looker Studio source)
    # -------------------------------------------------------------------------
    - name: Install BigQuery client
      shell: bash
      run: pip install --quiet google-cloud-bigquery

    - name: Write GCP credentials
      shell: bash
      run: |
        set -euo pipefail
        CREDS_FILE="${RUNNER_TEMP}/workflow-monitor/gcp-sa.json"
        export CREDS_FILE
        export GCP_CREDENTIALS_BASE64="${{ inputs.gcp-credentials-base64 }}"
        python3 "${{ github.action_path }}/scripts/decode_gcp_credentials.py"
        echo "credentials-file=${CREDS_FILE}" >> "$GITHUB_OUTPUT"

    - name: Insert workflow run into BigQuery
      id: bigquery-insert
      shell: bash
      env:
        INPUT_STATUS: ${{ inputs.workflow-status }}
        INPUT_RECORDS: ${{ inputs.records-processed }}
        INPUT_WARNINGS: ${{ inputs.warnings }}
        INPUT_LOG_FILE: ${{ inputs.log-file }}
        ERROR_MESSAGE: ${{ steps.parse-error.outputs.error-message || steps.parse-success.outputs.error-message }}
        ERROR_TYPE: ${{ steps.parse-error.outputs.error-type || steps.parse-success.outputs.error-type }}
        FAILED_STEP: ${{ steps.parse-error.outputs.failed-step || steps.parse-success.outputs.failed-step }}
        ACTION_REQUIRED: ${{ steps.parse-error.outputs.action-required || steps.parse-success.outputs.action-required }}
        START_TIME: ${{ steps.context.outputs.start-time }}
        END_TIME: ${{ steps.context.outputs.end-time }}
        RUN_URL: ${{ steps.context.outputs.run-url }}
        ARTIFACT_URL: ${{ steps.context.outputs.artifact-url }}
        SCHEDULED_CRON: ${{ inputs.scheduled-cron || github.event.schedule }}
        SCHEDULE_STATUS: ${{ inputs.schedule-status }}
        SCHEDULED_TIME_UTC: ${{ steps.context.outputs.start-time }}
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/workflow-monitor/gcp-sa.json
      run: |
        set -euo pipefail
        ROW_FILE="${RUNNER_TEMP}/workflow-monitor/bq-row.json"
        python3 "${{ github.action_path }}/scripts/build_bq_row.py" > "${ROW_FILE}"
        EVENT_ID="$(python3 -c "import json; print(json.load(open('${ROW_FILE}'))['event_id'])")"
        python3 "${{ github.action_path }}/scripts/insert_workflow_run.py" \
          --row-json "${ROW_FILE}" \
          --config "${{ github.action_path }}/config/bigquery.json" \
          --credentials "${GOOGLE_APPLICATION_CREDENTIALS}"
        echo "event-id=${EVENT_ID}" >> "$GITHUB_OUTPUT"

    # -------------------------------------------------------------------------
    # 6. Slack notifications (disabled — uncomment when ready)
    # -------------------------------------------------------------------------
    # - name: Build Slack failure payload
    #   id: slack-payload
    #   if: ${{ inputs.workflow-status == 'failure' }}
    #   shell: bash
    #   env:
    #     REPOSITORY: ${{ github.repository }}
    #     WORKFLOW: ${{ github.workflow }}
    #     FAILED_STEP: ${{ steps.parse-error.outputs.failed-step || inputs.failed-step }}
    #     ERROR_MESSAGE: ${{ steps.parse-error.outputs.error-message }}
    #     ACTION_REQUIRED: ${{ steps.parse-error.outputs.action-required }}
    #     RUN_URL: ${{ steps.context.outputs.run-url }}
    #     ARTIFACT_URL: ${{ steps.context.outputs.artifact-url }}
    #   run: |
    #     set -euo pipefail
    #     PAYLOAD_FILE="${RUNNER_TEMP}/workflow-monitor/slack-payload.json"
    #     export PAYLOAD_FILE
    #     python3 "${{ github.action_path }}/scripts/build_slack_payload.py"
    #     echo "payload-file=${PAYLOAD_FILE}" >> "$GITHUB_OUTPUT"
