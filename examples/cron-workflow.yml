# =============================================================================
# Example: Scheduled cron workflow with monitoring (copy into each cron repo)
# =============================================================================
# Minimal changes needed per repository:
#   1. Uses automationbot-art/github-monitor (update if forked elsewhere)
#   2. Add secret SLACK_WEBHOOK_URL at org or repo level
#   3. Adjust schedule, Python version, and the "Run cron job" command
# =============================================================================

name: Daily Cron With Monitor

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cron:
    name: Run scheduled task
    runs-on: ubuntu-latest
    outputs:
      records-processed: ${{ steps.cron.outputs.records-processed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Capture stdout/stderr so the monitor can extract the real error message.
      - name: Run cron job
        id: cron
        run: |
          set -o pipefail
          python main.py 2>&1 | tee "${RUNNER_TEMP}/cron-output.log"
          echo "records-processed=0" >> "$GITHUB_OUTPUT"

      # Always run monitor: summary + artifact on every run, Slack only on failure.
      - name: Workflow monitor
        if: always()
        uses: automationbot-art/github-monitor/.github/actions/workflow-monitor@main
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          workflow-status: ${{ steps.cron.outcome }}
          failed-step: Run cron job
          log-file: ${{ runner.temp }}/cron-output.log
          records-processed: ${{ steps.cron.outputs.records-processed }}
